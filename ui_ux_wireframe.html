<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVI UI/UX 와이어프레임</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e1e 0%, #121212 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 공통 글래스모피즘 스타일 */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* 1. 오버레이 위젯 모드 */
        .overlay-mode {
            width: 150px;
            height: 150px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .overlay-mode:hover {
            transform: scale(1.05);
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
            animation: breathe 3s infinite ease-in-out;
            position: relative;
        }

        .mic-icon {
            font-size: 30px;
            color: white;
        }

        /* 듣는 중 (파형 애니메이션 대체용 링) */
        .listening-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            animation: ripple 1.5s infinite ease-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(79, 172, 254, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(79, 172, 254, 0.8); }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .mode-title {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #ccc;
            width: 100%;
        }

        /* 2. 메인 윈도우 모드 */
        .main-window-mode {
            width: 400px;
            height: 600px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title span {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 10px;
            font-size: 18px;
            color: #aaa;
            cursor: pointer;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-right: 5px;
        }

        .chat-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-bubble {
            align-self: flex-end;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-bottom-right-radius: 5px;
        }

        .agent-bubble {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.15);
            border-bottom-left-radius: 5px;
        }

        .system-log {
            align-self: center;
            font-size: 12px;
            color: #888;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 10px;
            margin: 5px 0;
            font-family: monospace;
        }

        .footer {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
        }

        .text-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 15px;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }

        .text-input::placeholder {
            color: #888;
        }

        .send-btn {
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }
        
        .mic-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- 1. 오버레이 모드 -->
    <div>
        <div class="mode-title">Overlay Widget Mode<br>(대기/호출 상태)</div>
        <div class="glass-panel overlay-mode">
            <div class="mic-button">
                <div class="listening-ring"></div>
                <div class="mic-icon">🎙️</div>
            </div>
        </div>
    </div>

    <!-- 2. 메인 화면 모드 -->
    <div>
        <div class="mode-title">Main Window Mode<br>(대화 및 로그)</div>
        <div class="glass-panel main-window-mode">
            <div class="header">
                <div class="header-title">
                    🦋 <span>NAVI</span>
                </div>
                <div class="controls">
                    ⚙️ 📌 ➖ ✖️
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-bubble user-bubble">
                    유튜브에서 고양이가 춤추는 영상 찾아줘
                </div>
                
                <div class="system-log">
                    💻 [System] 브라우저 백그라운드 구동 중...
                </div>
                <div class="system-log">
                    🔍 [WebAgent] 유튜브 검색 쿼리 전송 및 결과 파싱 완료
                </div>

                <div class="chat-bubble agent-bubble">
                    유튜브에서 원하시는 영상을 찾았습니다!<br><br>
                    첫 번째 영상은 <strong>'스텝 밟는 고양이 댄스'</strong> 이며, 재생 시간은 약 3분입니다. <br><br>
                    해당 영상을 바로 재생할까요?
                </div>
            </div>

            <div class="footer">
                <button class="mic-toggle">🎙️</button>
                <input type="text" class="text-input" placeholder="명령어를 입력하세요...">
                <button class="send-btn">➤</button>
            </div>
        </div>
    </div>

</body>
</html>
